services:
  memos:
    build:
      context: ..
      dockerfile: scripts/Dockerfile
      args:
        ALPINE_MIRROR: https://mirrors.aliyun.com/alpine
        GOPROXY: https://goproxy.cn,direct
        GOSUMDB: sum.golang.google.cn
    image: aimemos:local
    container_name: aimemos
    environment:
      MEMOS_ENABLE_MCP: "true"
      MEMOS_MCP_PATH: /mcp
      TZ: Asia/Shanghai
    volumes:
      - ~/.memos/:/var/opt/memos
    ports:
      - "5230:5230"
